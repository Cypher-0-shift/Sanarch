<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .vital-gradient {
        background: linear-gradient(135deg, #006a35 0%, #2ECC71 100%);
      }
      .glass-pill {
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.9);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Main Container -->
<main class="relative h-screen w-full flex flex-col">
<!-- Top 2/3: Vibrant Section -->
<section class="relative h-[65%] w-full vital-gradient flex items-end justify-center px-6 overflow-hidden">
<!-- Branding (TopAppBar Shell Integration) -->
<div class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-8">
<span class="font-headline font-extrabold tracking-tight text-white text-2xl" style="">Sanarch</span>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md" style="">
<span class="material-symbols-outlined" data-icon="close" style="">close</span>
</button>
</div>
<!-- Doctor Image Container -->
<div class="relative w-full h-full max-w-lg flex items-end justify-center">
<!-- Floating Badges -->
<div class="absolute -left-2 glass-pill px-4 py-2.5 rounded-full flex items-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.1)] z-20 top-[32%]">
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary-container" data-icon="schedule" data-weight="fill" style='font-variation-settings: "FILL" 1;'>schedule</span>
</div>
<span class="font-headline font-bold text-xs text-on-surface" style="">Save Time</span>
</div>
<div class="absolute -right-4 glass-pill px-4 py-2.5 rounded-full flex items-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.1)] z-20 top-[60%]">
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary-container" data-icon="event_available" data-weight="fill" style='font-variation-settings: "FILL" 1;'>event_available</span>
</div>
<span class="font-headline font-bold text-xs text-on-surface" style="">Scan Anywhere</span>
</div>
<div class="absolute -left-4 glass-pill px-4 py-2.5 rounded-full flex items-center gap-2 shadow-[0_10px_30px_rgba(0,0,0,0.1)] z-20 bottom-[25%]">
<div class="w-6 h-6 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary-container" data-icon="medical_services" data-weight="fill" style='font-variation-settings: "FILL" 1;'>medical_services</span>
</div>
<span class="font-headline font-bold text-xs text-on-surface" style="">Stay Organised<br/></span>
</div>
<!-- Main Professional Cutout -->
<img alt="Healthcare professional using Sanarch app" class="h-[90%] w-auto object-contain z-10 filter drop-shadow-[0_20px_50px_rgba(0,0,0,0.2)] rounded-3xl" src="https://lh3.googleusercontent.com/aida/ADBb0ughFlxg4Mcixfc1JAaSlDd77pbm6Zyo0AjqYd-8v09Zs0DX3XfF69_yGs8H2MySLkPlYzB2SoOu6h9oE3EAGd--ShpKdq01ixEnN9Y7M0cgweYbUB6g8JxuuVexkJ2VQirabwMMCUkbPRWd6f3bBEVQN6LTKZSgaE76HMP7DR9lbqs5BA_u_pBuuQlD5MfeeRk6nQxIjttRRBOtp6eC1BKTsi9wNYGD97KAz4ZLQJ3K5BmsvsGTsuEc8UXfqcM_p9u1hKdTbdg" style=""/>
</div>
</section>
<!-- Bottom 1/3: Content Card -->
<section class="relative h-[35%] w-full z-30">
<!-- Overlapping Card -->
<div class="absolute -top-12 inset-x-0 bottom-0 bg-surface-container-lowest rounded-t-[3rem] px-8 pt-10 pb-8 flex flex-col justify-between">
<!-- Card Header Action -->
<div class="flex flex-col items-center">
<button class="bg-primary hover:bg-primary-dim transition-colors text-on-primary py-3.5 px-8 rounded-full font-headline font-bold text-sm shadow-xl shadow-primary/20" style="">
                        Book Your Appointment
                    </button>
</div>
<!-- Main Text Content -->
<div class="mt-8 space-y-2 text-center">
<h1 class="font-headline font-extrabold text-3xl text-on-surface leading-tight tracking-tight" style="">
                        One App For All Your Healthcare Needs
                    </h1>
<p class="font-body text-on-surface-variant text-lg" style="">
                        Health made simpler.
                    </p>
</div>
<!-- Pagination and Navigation -->
<div class="flex items-center mt-auto justify-end">
<!-- Pagination Dots -->
<!-- Next Button -->
<button class="w-14 h-14 rounded-full bg-on-surface flex items-center justify-center shadow-lg active:scale-95 transition-transform" style="">
<span class="material-symbols-outlined text-surface text-2xl" data-icon="arrow_forward" style="">arrow_forward</span>
</button>
</div>
</div>
</section>
</main>
<!-- Suppressed Shell Components for Focused Onboarding Experience as per Hierarchy Rule -->
<!-- Navbars are hidden to prioritize the focused onboarding journey -->
