<body class="bg-surface text-on-surface flex min-h-screen items-center justify-center p-6">
<!-- Auth Container -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Brand Identity Section -->
<div class="mb-10 text-center">
<div class="flex items-center justify-center gap-2 mb-6">
<img alt="Sanarch Logo" class="object-contain w-[52px] h-[52px]" src="https://lh3.googleusercontent.com/aida/ADBb0uiiMZBzeUXVheqpcXBHVgn3Rah5J7rgMOWEheB4hkx46Da8XJ4jJQqt5IPYYI1esqSpuyNrY-g-Mv5dKdYC46dKg2eRtBLZ6-c7ULpodlEgBQuZZwsT5_8vP8zZXZ-f--uGUJUpLYM6sLTXzN5e33XGV3uPbnsPhiU1iIsX_ypwa5bbbt5ObDkrWrwUzUcojzt7keR8f2ztd3w2V7gtGFjruBg4Zq6kj3qqSin4UO63_Viocsmw-hJMp-Jk0jgL71J4nBYk_g" style="">
<span class="brand-logo text-primary text-3xl font-extrabold tracking-tighter" style="">Sanarch&nbsp;</span>
</div>
<h1 class="text-3xl font-bold text-on-surface tracking-tight mb-2" style="">Welcome Back</h1>
<p class="text-on-surface-variant font-medium" style="">Sign in to continue your health journey</p>
</div>
<!-- Form Canvas -->
<div class="w-full bg-surface-container-lowest rounded-[2rem] p-8 shadow-[0_20px_50px_rgba(0,106,53,0.04)]">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="email" style="">Email Address</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 outline-none placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface" for="password" style="">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#" style="">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 outline-none placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-secondary text-on-primary font-bold rounded-full shadow-lg shadow-primary/10 hover:shadow-primary/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit" style="">
                    Sign In
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward" style="">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest font-bold text-outline-variant">
<span class="bg-surface-container-lowest px-4" style="">Or sign in with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border border-outline-variant/10 hover:bg-surface-container-low transition-colors duration-300 group" style="">
<img alt="Google Logo" class="w-5 h-5 opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Official colorful Google G logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHT3egGcsod6ARCnO-i42RD8RpEdFK5r-tb9YgN3-PhWF-NnWH7K-ct0nEj2W3fFnznMmp65sC9GA7Y8_Pt_fb-Qqt269wbQzMivLxdN9ixBAQeFgTYhlcm0LnuH11TVA2ee4_7PCsUCWaSqN0d5Mpys9LvjSlpGdPjPtdrzTaC_4FIi8SmRRTA9iwA0OA6XK0ImuM0zTkjZeLF0Es3yjgQf5wn7tCb4x5vHEUvEauwl-BuFdH5VPWx6Z862nvMgiG0p0mGPQ_" style="">
<span class="text-sm font-bold text-on-surface" style="">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border border-outline-variant/10 hover:bg-surface-container-low transition-colors duration-300 group" style="">
<span class="material-symbols-outlined text-2xl text-on-surface opacity-80 group-hover:opacity-100 transition-opacity" data-icon="apple" data-weight="fill" style="">ios</span>
<span class="text-sm font-bold text-on-surface" style="">Apple</span>
</button>
</div>
</div>
<!-- Secondary CTA -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium" style="">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2 decoration-primary/30 transition-all" href="#" style="">Sign Up</a>
</p>
</div>
</main>
<!-- Background Decoration (Vital Serenity Aesthetic) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/20 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary-container/30 blur-[100px] -z-10 rounded-full"></div>
