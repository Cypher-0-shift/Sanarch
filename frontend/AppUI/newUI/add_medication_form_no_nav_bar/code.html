<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sanarch Healthcare - Add Medication</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#b31b25",
              "error-dim": "#9f0519",
              "tertiary-fixed-dim": "#00cdee",
              "outline": "#747778",
              "on-tertiary-container": "#004956",
              "on-tertiary-fixed-variant": "#005361",
              "on-secondary-fixed": "#004930",
              "surface": "#f5f7f8",
              "secondary": "#006946",
              "primary": "#006a35",
              "surface-variant": "#d9dddf",
              "surface-dim": "#d0d5d7",
              "on-surface": "#2c2f30",
              "on-error-container": "#570008",
              "on-background": "#2c2f30",
              "secondary-fixed": "#72fbbd",
              "inverse-primary": "#6bfe9c",
              "primary-fixed-dim": "#5bef90",
              "background": "#f5f7f8",
              "on-secondary-fixed-variant": "#006946",
              "tertiary": "#006576",
              "on-primary-fixed": "#004a23",
              "tertiary-fixed": "#00dcff",
              "primary-container": "#6bfe9c",
              "tertiary-dim": "#005867",
              "on-primary-fixed-variant": "#006a35",
              "on-secondary": "#c9ffdf",
              "error-container": "#fb5151",
              "secondary-container": "#72fbbd",
              "outline-variant": "#abadae",
              "on-primary-container": "#005f2f",
              "secondary-fixed-dim": "#63ecaf",
              "primary-dim": "#005c2d",
              "on-surface-variant": "#595c5d",
              "surface-bright": "#f5f7f8",
              "on-error": "#ffefee",
              "surface-tint": "#006a35",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#6bfe9c",
              "inverse-on-surface": "#9a9d9e",
              "tertiary-container": "#00dcff",
              "inverse-surface": "#0b0f10",
              "surface-container-low": "#eef1f2",
              "secondary-dim": "#005c3d",
              "on-tertiary-fixed": "#00333d",
              "surface-container-highest": "#d9dddf",
              "surface-container": "#e5e9ea",
              "on-primary": "#cdffd4",
              "on-secondary-container": "#005e3e",
              "surface-container-high": "#dfe3e4",
              "on-tertiary": "#ddf7ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7f8;
        }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Custom form elements mapping the 'No-Line' rule through background tiers */
        .form-input-container {
            height: 56px;
            border-radius: 1rem; /* 16px */
            border: 2px solid #E0E0E0;
            background-color: #ffffff;
            transition: all 0.2s ease;
        }
        .form-input-container:focus-within {
            border-color: rgba(0, 106, 53, 0.4);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 106, 53, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-[#1a1c1e]/80 backdrop-blur-xl shadow-[0_40px_40px_rgba(0,0,0,0.06)]">
<div class="flex items-center px-4 py-3 w-full max-w-lg mx-auto">
<button class="flex items-center justify-center text-[#2c2f30] dark:text-[#e2e2e6] active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-['Plus_Jakarta_Sans'] font-semibold text-lg text-[#143832] dark:text-[#e2e2e6]">Add Medication</h1>
</div>
<div class="bg-[#eef1f2] dark:bg-[#2c2f30] h-[1px] w-full"></div>
</header>
<main class="pt-24 pb-12 px-6 max-w-lg mx-auto">
<!-- Form Content -->
<div class="space-y-8">
<!-- Section: Basic Info -->
<section class="space-y-4">
<h2 class="font-headline font-bold text-on-surface text-sm tracking-wide uppercase opacity-60">General Information</h2>
<!-- Medicine Name -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Medicine Name</label>
<div class="form-input-container flex items-center px-4">
<span class="material-symbols-outlined text-primary/60 mr-3" data-icon="medication">medication</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" placeholder="e.g., Metformin" type="text"/>
</div>
</div>
<!-- Dosage -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Dosage</label>
<div class="form-input-container flex items-center px-4">
<span class="material-symbols-outlined text-primary/60 mr-3" data-icon="medical_information">medical_information</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" placeholder="e.g., 500mg" type="text"/>
</div>
</div>
</section>
<!-- Section: Schedule -->
<section class="space-y-4 bg-surface-container-low p-6 rounded-2xl">
<h2 class="font-headline font-bold text-on-surface text-sm tracking-wide uppercase opacity-60">Dosing Schedule</h2>
<!-- Frequency Dropdown -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Frequency</label>
<div class="relative">
<select class="w-full h-[56px] px-4 rounded-2xl border-2 border-[#E0E0E0] bg-surface-container-lowest text-on-surface font-body focus:ring-2 focus:ring-primary/20 focus:border-primary/40 appearance-none">
<option>Once daily</option>
<option selected="">Twice daily</option>
<option>Three times daily</option>
<option>As needed (PRN)</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Time Pickers -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Morning</label>
<div class="form-input-container flex items-center px-4 bg-surface-container-lowest">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" type="time" value="08:00"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Evening</label>
<div class="form-input-container flex items-center px-4 bg-surface-container-lowest">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" type="time" value="20:00"/>
</div>
</div>
</div>
</section>
<!-- Section: Duration -->
<section class="space-y-4">
<div class="flex justify-between items-end mb-1">
<h2 class="font-headline font-bold text-on-surface text-sm tracking-wide uppercase opacity-60">Duration</h2>
<div class="flex items-center gap-2 mb-0.5">
<span class="text-xs font-semibold text-on-surface-variant">Ongoing</span>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-10 h-5 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Start Date</label>
<div class="form-input-container flex items-center px-4">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" type="date" value="2023-10-27"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-on-surface-variant ml-1">End Date</label>
<div class="form-input-container flex items-center px-4">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body p-0" placeholder="Select date" type="date"/>
</div>
</div>
</div>
</section>
<!-- Section: Notes -->
<section class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant ml-1">Notes &amp; Instructions</label>
<textarea class="w-full p-4 rounded-2xl border-2 border-[#E0E0E0] bg-surface-container-lowest text-on-surface font-body focus:ring-2 focus:ring-primary/20 focus:border-primary/40 resize-none" placeholder="Instructions from doctor..." rows="4"></textarea>
</section>
<!-- CTA -->
<div class="pt-4">
<button class="w-full h-14 rounded-2xl bg-gradient-to-r from-[#006a35] to-[#2ECC71] text-white font-headline font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add_task">add_task</span>
                    Add Medication
                </button>
</div>
</div>
</main>
</body></html>
